l_english:
 # valid formats:
 # name_NAME
 # name_NAME.[culture]
 # name_NAME.[language]
 # name_NAME.[language].[culture]
 # name_NAME.diminutive
 # name_NAME.genitive
 # name_NAME.[culture].diminutive
 # name_NAME.[culture].genitive
 # name_NAME.[language].diminutive
 # name_NAME.[language].genitive
 # name_NAME.[language].[culture].diminutive
 # name_NAME.[language].[culture].genitive
 #
 # diminutive is used when a character has no dynasty
 # genitive is used when a patronym, e.g. as in Irish usage
 #
 # you can also join compound names like this so they can have a unique form in some languages:
 # name_michael.name_angel.north_italian_language: "Michelangelo"
 #
 name_carlos_estevao: "Charles Stephen"
 name_carlos_estevao.coptic_language: "Garlos Stefanos"
 name_carlos_estevao.portuguese_language: "Carlos Estevão"
 name_carlos_estevao.spanish_language: "Carlos Esteban"