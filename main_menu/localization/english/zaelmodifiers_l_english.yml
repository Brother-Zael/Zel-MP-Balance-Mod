 STATIC_MODIFIER_NAME_zel_france_nerf: "Anchronistic Military Traditions"
 STATIC_MODIFIER_DESC_zel_france_nerf: "At the start of the Hundred Year's War, France continued to rely upon old, tried and tested methods of warfare that would soon prove utterly incapable of defeating the innovative British tactics and brilliant Edwardian leadership. Within two generations these lessons would be learned, and the tide change, but until then, France has a long painful road ahead."
 
